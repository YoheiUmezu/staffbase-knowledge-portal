<!DOCTYPE html>

  <style>

</head>
<body>
  <header>
    <div class="nav">
      <a href="index.html">← カテゴリ一覧へ戻る</a>

  <main>

    const geminiGuideMap = {

        ],
        prompt: 'Staffbase RFP Response Engine\\n\\n1. 役割とミッション\\nあなたは Staffbaseのシニア・セールスエンジニア（SE）です。顧客から提出されたRFP（Excel）に対し、「最新の公式ソース」のみに基づいて、正確かつ責任ある回答を生成してください。\\n\\n2. 唯一のプロダクト情報源（厳守）\\nURL: https://raw.githubusercontent.com/YoheiUmezu/staffbase-product-reference/main/staffbase_urls.md\\n- 回答前に必ず上記URLへアクセスし、記載されている各リンク先を解析すること\\n- URLリスト外の情報、一般知識、過去学習データに基づく回答は禁止\\n\\n3. 補助KB（ローカルファイルのみ参照）\\n- security_kb.md\\n- isms_controls.md\\n- ops_kb.md\\n- compliance_kb.md\\n- limitations_kb.md（必ず制約クロスチェック）\\n\\n4. 回答生成アルゴリズム\\n- 設問分類: 製品機能 / セキュリティ・運用・法務\\n- 情報抽出:\\n  - 製品機能: staffbase_urls.md から最適な個別記事URLを特定して内容抽出\\n  - 重要: `/hc/ja` のようなトップ・汎用URLの参照は禁止。必ず `/articles/` の個別記事までドリルダウン\\n- 制約検証: limitations_kb.md を必ず確認\\n- 根拠不在時: 「要確認（公式資料未記載）」\\n\\n5. 出力ルール\\n- 回答末尾は「参照：」で記載（「根拠」表記は不要）\\n- 参照は `https://support.staffbase.com/hc/ja/articles/〜` の個別記事URL、またはKBファイル名\\n- 「参照：https://support.staffbase.com/hc/ja」のような汎用URLのみの記載は禁止\\n\\n6. 禁止事項\\n- 一般論の流用禁止\\n- 曖昧回答の禁止\\n- 指定外ソースの外部検索結果の混入禁止\\n\\n---\\n以下のRFP設問に対して、上記ルールに厳密に従って回答してください。'
      },
      note: {
        summary: 'note記事の元データ（manus_input.md）を使って、Manus上で記事生成から最終保存指示まで進めるためのリポジトリです。非エンジニアは「プロンプト運用」に集中すれば使えます。',
        flow: [

          'Step 3として、完成記事をMCP経由でNotionデータベース「note記事まとめ」に保存する指示（タイトル/ステータス/カテゴリ/作成日/本文）を実行させ、最後に保存完了報告を受ける。'
        ],
        promptByRole: {
          se: '# Role\\nあなたは「BtoB SaaS企業のセールスエンジニア兼コンテンツ編集者」です。\\n\\n# Step 1\\n以下URLを取得し、本日の執筆テーマと参考インプットを読み取ってください。\\nhttps://raw.githubusercontent.com/YoheiUmezu/note-article/main/manus_input.md\\n\\n# Step 2\\nnote記事を作成してください。\\n- 文字数: 1500〜2000字\\n- トーン: 専門的だが読みやすい（日本企業の稟議・現場運用・導入障壁を重視）\\n- 必須: 具体的な業務シーン + 1つ以上の実例\\n- 締め: staffbaseはツール導入にとどまらずEX課題の解決に取り組む旨\\n\\n# Step 3\\nMCPを使い、Notionデータベース「note記事まとめ」に保存してください。\\n- タイトル: 生成記事タイトル\\n- ステータス: Ready to Post\\n- カテゴリ: EX/従業員エンゲージメント\\n- 作成日: 本日\\n- 本文: Markdown全文\\n\\n# Output\\n1) 記事プレビュー\\n2) Notion保存完了報告\\n\\n# ガイドライン\\n機密情報（未発表機能/顧客名/社内数値）は含めず、一般的なEX改善Tipsに限定。\\n「個人の見解」である旨を明記し、公式ロゴは使用しない。',
          marketer: '# Role\\nあなたは「BtoB SaaS企業のコンテンツマーケター兼ストラテジックライター」です。\\nEX（従業員エクスペリエンス）領域における最新トレンドとSEO視点を掛け合わせ、note記事の生成から社内コンテンツ資産化までを行います。\\n\\n# Step 1: 外部コンテキストの取得\\n以下のURLから本日の執筆テーマとインプット情報を取得してください。\\nURL: https://raw.githubusercontent.com/YoheiUmezu/note-article/main/manus_input.md\\n\\n# Step 2: note記事の執筆\\n\\n## 目的\\n- 認知拡大（Top of Funnel）を意識した記事にする\\n- EX領域の課題を「共感→問題定義→解決示唆」で構造化する\\n- 営業・ホワイトペーパー・ウェビナーに転用可能な資産にする\\n\\n## 構成\\n- 読者は「人事・社内広報・情シス」\\n- 課題提起を強めに入れる（例：エンゲージメント低下、情報断絶）\\n- 解決策は“戦略レベル”で提示（ツール説明に寄りすぎない）\\n\\n## 制約・トーン\\n- 文字数：1500〜2000字\\n- トーン：戦略的・やや啓蒙的・読みやすい\\n- 必須要素：市場背景 or トレンドを最低1つ含める\\n- 禁止：プロダクトの機能説明中心の文章\\n\\n## 締め方\\nstaffbaseがEX領域の課題を「情報発信の仕組み」ではなく「組織の構造課題」として解決していることを示す\\n\\n# Step 3: MCPによるNotionへのアップロード\\n- DB: note記事まとめ\\n- ステータス: Ready to Post\\n- カテゴリ: EX/従業員エンゲージメント',
          sales: '# Role\\nあなたは「BtoB SaaS企業のセールスエンジニア兼提案ストラテジスト」です。\\n顧客の意思決定プロセス（稟議・比較検討・ROI評価）を前提にnote記事を作成し、提案資料として再利用可能な形式にします。\\n\\n# Step 1: 外部コンテキストの取得\\nURL: https://raw.githubusercontent.com/YoheiUmezu/note-article/main/manus_input.md\\n\\n# Step 2: note記事の執筆\\n\\n## 目的\\n- 商談支援（Deal Acceleration）に直結するコンテンツにする\\n- 「なぜ今必要か」「導入障壁」「ROI」を明確化\\n- 営業資料・提案書に転用できる構造化情報を生成\\n\\n## 構成\\n- 読者：人事責任者・情報システム部・経営企画\\n- 必ず以下を含める：\\n  - 現場の典型的な失敗パターン\\n  - 導入前後の比較ストーリー（1社想定でOK）\\n  - 意思決定ポイント（稟議観点）\\n\\n## 制約・トーン\\n- 文字数：1500〜2000字\\n- トーン：実務的・ロジカル・ややコンサル寄り\\n- 必須：1つ以上の“導入現場のリアルなユースケース”\\n- 禁止：抽象論・精神論\\n\\n## 締め方\\nstaffbaseが単なる社内ポータルではなく「意思決定と行動を変えるEX基盤」であることを明示\\n\\n# Step 3: MCPによるNotionへのアップロード\\n- DB: note記事まとめ\\n- ステータス: Ready to Post\\n- カテゴリ: EX/従業員エンゲージメント',
          country_manager: '# Role\\nあなたは「BtoB SaaS企業のカントリーマネージャー兼ストラテジックアドバイザー」です。\\n市場戦略・競争環境・組織課題を踏まえ、経営視点でnote記事を作成します。\\n\\n# Step 1: 外部コンテキストの取得\\nURL: https://raw.githubusercontent.com/YoheiUmezu/note-article/main/manus_input.md\\n\\n# Step 2: note記事の執筆\\n\\n## 目的\\n- 日本市場におけるEX戦略の位置づけを定義する\\n- 経営・HR・ITの意思決定レイヤーに刺さる論点整理\\n- パートナー・顧客向けの“思想的リード文書”として使えるレベルにする\\n\\n## 構成\\n- 読者：経営層・CHRO・CIO\\n- 以下を必須で含める：\\n  - 市場トレンド（日本企業特有の制約含む）\\n  - 組織変革におけるボトルネック\\n  - EX投資の戦略的意義\\n  - 競争環境の示唆（直接比較は避けるが構造は語る）\\n\\n## 制約・トーン\\n- 文字数：1500〜2000字\\n- トーン：経営的・構造的・落ち着いた論調\\n- 禁止：製品機能の説明\\n- 必須：1つ以上の「経営判断レベルの示唆」\\n\\n## 締め方\\nstaffbaseが単なるSaaSではなく「組織OSとしてのEX基盤」であることを明確に示す\\n\\n# Step 3: MCPによるNotionへのアップロード\\n- DB: note記事まとめ\\n- ステータス: Ready to Post\\n- カテゴリ: EX/従業員エンゲージメント'
        }
      },
      slides: {
        summary: 'Staffbaseブランドに沿ったスライドを再利用可能なJSONで作るためのリポジトリです。デザインルールを守ることが主眼です。',
        flow: [
          'GithubからダウンロードしたREADMEとテンプレートJSONをManusへ渡し、「この資料の必須デザインルール」を抽出させる。',
          '伝えたいトピックを箇条書きで入力し、スライド構成案（表紙/要点/まとめ）を作らせる。',

        prompt: '以下のトピックを、添付のスライドルールに準拠して提案資料化してください。\\n出力: スライド番号 / タイトル / 1枚の要点 / 話す内容メモ'
      },
      analytics: {
        summary: 'このカテゴリでは、Manusに分析専用ロールを与えてBefore/After JSONを根拠に検索体験改善レポートを作成します。製造業向けの広報・DX担当が意思決定に使える粒度で出すことが目的です。',
        flow: [
          'Manusで新規チャットを開き、下記プロンプトを先に貼って分析ルール（JSON根拠必須・抽象論禁止）を固定する。',
          '入力データとして report.md / before.json / after.json の3URLを必ず渡し、「改善幅（%）」と「改善/未改善の判定」を明示させる。',
          '出力はエグゼクティブサマリー→KPI比較→改善クエリ分析→構造的インサイト→次アクション（優先度つき）の順にさせる。',
          '定期運用する場合は、この指示をGem（カスタムGem）として保存し、毎回URLだけ差し替える運用にする。'
        ],
        promptTemplate: 'あなたはBtoB SaaS企業（特に製造業向け）のコンテンツ戦略担当です。\\n\\n{{leadText}}\\n\\n# 入力データ\\n- シナリオ一覧（Markdown）:\\nhttps://raw.githubusercontent.com/YoheiUmezu/analytics_json/main/analytics_json/scenario_index.md\\n\\n- シナリオ一覧（JSON）:\\nhttps://raw.githubusercontent.com/YoheiUmezu/analytics_json/main/analytics_json/scenario_index.json\\n\\n- 分析レポート（Markdown）:\\n{{reportUrl}}\\n\\n- Beforeデータ（JSON）:\\n{{beforeUrl}}\\n\\n- Afterデータ（JSON）:\\n{{afterUrl}}\\n\\n# 目的\\n・検索体験（Search Experience）の改善結果を明確にする\\n・どのクエリで改善が起きたかを特定する\\n・今後のナレッジ改善アクションを提示する\\n\\n# 出力要件\\n1. エグゼクティブサマリー（5行以内、改善/未改善を明確化）\\n2. KPI比較（検索数/クリック数/CTR/成功率、改善幅%を必ず記載）\\n3. 改善クエリ分析（改善上位5クエリ、悪化クエリ、Before/After数値、変化理由の仮説）\\n4. 構造的インサイト（コンテンツ不足/検索意図とのズレ/UI導線）\\n5. 次アクション（どの記事をどう改善するか、新規作成記事、優先順位High/Medium/Low）\\n6. トーン: 日本語・ビジネス向け・具体化重視\\n\\n# 制約\\n- JSONデータを必ず根拠として使う\\n- 推測だけの記述は禁止\\n- 箇条書きを多用し、読みやすくする\\n\\nこの要件に厳密に従って出力してください。'
      },
      demo_ui_project: {
        summary: 'このカテゴリでは、Manusを使ってデモUI提案の進行手順と成果物方針を整理します。提案準備を短時間で標準化するのが目的です。',
        flow: [
          'Manusには「企業名」と「企業公式URL」だけを最初に渡し、提案前提を固定する。',

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function renderFlow(flow) {
      const root = document.getElementById('geminiFlow');
      root.innerHTML = '';
      (flow || []).forEach((item, index) => {
        const block = document.createElement('div');
        block.className = 'step';
        block.innerHTML = `<strong>Step ${index + 1}</strong><div>${escapeHtml(item)}</div>`;
        root.appendChild(block);
      });
    }

    function normalizePromptText(text) {
      return String(text || '').replaceAll('\\n', '\n');
    }

    function setPromptText(text) {
      document.getElementById('geminiPrompt').textContent = normalizePromptText(text);
    }

    function buildAnalyticsPrompt(scenarioId) {
      const selected = analyticsScenarioOptions.find((option) => option.id === scenarioId) || analyticsScenarioOptions[0];
      const reportUrl = `https://raw.githubusercontent.com/YoheiUmezu/analytics_json/main/analytics_json/latest_${selected.id}_report.md`;
      const beforeUrl = `https://raw.githubusercontent.com/YoheiUmezu/analytics_json/main/analytics_json/latest_${selected.id}_before.json`;
      const afterUrl = `https://raw.githubusercontent.com/YoheiUmezu/analytics_json/main/analytics_json/latest_${selected.id}_after.json`;
      const leadText = analyticsScenarioLeadMap[selected.id] || analyticsScenarioLeadMap.qa_improvement;
      const urlsRoot = document.getElementById('analyticsScenarioUrls');
      urlsRoot.innerHTML = `<p><strong>report:</strong> <a href="${reportUrl}" target="_blank" rel="noopener noreferrer">${reportUrl}</a></p><p><strong>before:</strong> <a href="${beforeUrl}" target="_blank" rel="noopener noreferrer">${beforeUrl}</a></p><p><strong>after:</strong> <a href="${afterUrl}" target="_blank" rel="noopener noreferrer">${afterUrl}</a></p>`;
      return geminiGuideMap.analytics.promptTemplate
        .replace('{{leadText}}', leadText)
        .replace('{{reportUrl}}', reportUrl)
        .replace('{{beforeUrl}}', beforeUrl)
        .replace('{{afterUrl}}', afterUrl);
    }

    function setupAnalyticsScenarioSelector() {
      const panel = document.getElementById('analyticsScenarioPanel');
      const select = document.getElementById('analyticsScenarioSelect');
      select.innerHTML = '';
      for (const option of analyticsScenarioOptions) {
        const el = document.createElement('option');
        el.value = option.id;
        el.textContent = option.label;
        select.appendChild(el);
      }
      select.value = 'qa_improvement';
      setPromptText(buildAnalyticsPrompt(select.value));
      select.onchange = () => {
        setPromptText(buildAnalyticsPrompt(select.value));
      };
      panel.style.display = 'block';
    }

    function setupNoteRoleTabs() {
      const panel = document.getElementById('noteRolePanel');
      const tabsRoot = document.getElementById('noteRoleTabs');
      const params = new URLSearchParams(window.location.search);
      const roles = [
        { id: 'se', label: 'セールスエンジニア' },
        { id: 'marketer', label: 'マーケター' },
        { id: 'sales', label: '営業' },
        { id: 'country_manager', label: 'カントリーマネージャー' }
      ];
      tabsRoot.innerHTML = '';

      const selectRole = (roleId) => {
        setPromptText(geminiGuideMap.note.promptByRole[roleId] || '準備中');
        tabsRoot.querySelectorAll('.tab-btn').forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.role === roleId);
        });
        localStorage.setItem('notePromptRole', roleId);
        params.set('role', roleId);
        history.replaceState({}, '', `${window.location.pathname}?${params.toString()}`);
      };

      for (const role of roles) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tab-btn';
        btn.dataset.role = role.id;
        btn.textContent = role.label;
        btn.onclick = () => selectRole(role.id);
        tabsRoot.appendChild(btn);
      }

      panel.style.display = 'block';
      const savedRole = params.get('role') || localStorage.getItem('notePromptRole') || 'se';
      const roleExists = roles.some((role) => role.id === savedRole);
      selectRole(roleExists ? savedRole : 'se');
    }

    async function loadUseCase() {
      const params = new URLSearchParams(window.location.search);
      const category = params.get('category') || 'unknown';
      document.getElementById('backToCategoryLink').href = `index.html#category=${encodeURIComponent(category)}`;
      document.getElementById('title').textContent = `${escapeHtml(category)} のManus使用ガイド`;
      document.getElementById('flowHeading').textContent = 'Manusで1から使うフロー';
      document.getElementById('promptBadge').textContent = 'そのままManusに貼り付けOK';
      const guide = geminiGuideMap[category];
      document.getElementById('plainSummary').textContent = guide ? guide.summary : 'このカテゴリの説明は準備中です。';
      renderFlow(guide ? guide.flow : []);
      document.getElementById('urlNote').style.display = category === 'slides' ? 'none' : 'block';
      document.getElementById('analyticsScenarioPanel').style.display = 'none';
      document.getElementById('noteRolePanel').style.display = 'none';
      if (category === 'analytics') {
        setupAnalyticsScenarioSelector();
      } else if (category === 'note') {
        setupNoteRoleTabs();
      } else if (category === 'demo_ui_project' && guide && guide.polishPrompt) {
        setPromptText(`${guide.prompt}\n\n---\n\n# Gemini / Genspark 画像ブラッシュアップ用プロンプト\n${guide.polishPrompt}`);
      } else {
        setPromptText(guide ? guide.prompt : '準備中');
      }
    }

    document.getElementById('copyPromptButton').onclick = async () => {
      const status = document.getElementById('copyStatus');
      try {
        await navigator.clipboard.writeText(document.getElementById('geminiPrompt').textContent || '');
        status.textContent = 'コピーしました';
      } catch (_) {
        status.textContent = 'コピーに失敗しました';
      }
      setTimeout(() => { status.textContent = ''; }, 1800);
    };

    loadUseCase().catch((error) => {
      document.getElementById('subtitle').textContent = '読み込みに失敗しました。';
      document.getElementById('plainSummary').textContent = error.message;
    });
  </script>
