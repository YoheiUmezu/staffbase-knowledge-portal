<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>実際のユースケース | Staffbase Knowledge Portal</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f7fb; color: #1f2a44; }
    header { background: linear-gradient(135deg, #0b1446, #1b2b78); color: #fff; padding: 28px 20px; }
    main { max-width: 980px; margin: 20px auto 40px; padding: 0 16px; }
    .nav { margin-bottom: 12px; }
    .nav a { color: #fff; text-decoration: none; font-size: 14px; }
    .hero h1 { margin: 0 0 8px; font-size: 28px; }
    .hero p { margin: 0; opacity: 0.95; }
    .panel { background: #fff; border-radius: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); padding: 20px; margin-top: 14px; }
    .chip { display: inline-block; background: #e9eeff; color: #0b1446; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; }
    h2 { margin: 0 0 10px; font-size: 20px; }
    ul { margin: 0; padding-left: 20px; }
    li { margin: 8px 0; line-height: 1.6; }
    .example { background: #f7f9ff; border: 1px solid #dce5ff; border-radius: 10px; padding: 14px; line-height: 1.7; }
    .flow { display: grid; gap: 10px; }
    .step { border: 1px solid #dce5ff; border-radius: 10px; padding: 12px; background: #fcfdff; }
    .step strong { color: #0b1446; }
    .prompt { background: #0f173f; color: #eaf0ff; border-radius: 10px; padding: 14px; font-size: 14px; white-space: pre-wrap; line-height: 1.6; }
    .badge { display: inline-block; font-size: 12px; color: #0b1446; background: #e8efff; padding: 4px 8px; border-radius: 999px; margin-bottom: 8px; }
    .scenario-panel { margin-top: 10px; padding: 12px; background: #f7f9ff; border: 1px solid #dce5ff; border-radius: 10px; }
    .scenario-panel label { font-size: 13px; font-weight: 700; color: #1f2a44; display: block; margin-bottom: 6px; }
    .scenario-panel select { width: 100%; max-width: 360px; padding: 8px 10px; border: 1px solid #c7d3f5; border-radius: 8px; background: #fff; }
    .scenario-note { margin-top: 8px; font-size: 12px; color: #506080; }
    .checklist { margin-top: 10px; padding: 12px; background: #f7f9ff; border: 1px solid #dce5ff; border-radius: 10px; }
    .checklist label { display: flex; gap: 8px; align-items: flex-start; margin: 8px 0; font-size: 14px; line-height: 1.5; }
    .checklist input { margin-top: 2px; }
  </style>
</head>
<body>
  <header>
    <div class="nav"><a href="index.html">← カテゴリ一覧へ戻る</a></div>
    <div class="hero">
      <h1 id="title">実際のユースケース</h1>
      <p id="subtitle">業務での使い方を分かりやすく整理しています。</p>
    </div>
  </header>
  <main>
    <section class="panel">
      <h2>このリポジトリが何をしているか（非エンジニア向け）</h2>
      <p id="plainSummary"></p>
    </section>
    <section class="panel">
      <h2 id="flowHeading">Geminiで1から使うフロー</h2>
      <div class="flow" id="geminiFlow"></div>
      <div id="rfpChecklistPanel" class="checklist" style="display:none;">
        <strong>NotebookLM 初回セットアップチェックリスト</strong>
        <label><input type="checkbox" /> `staffbase_urls.md` と補助KB（5ファイル）をNotebookLMに追加した</label>
        <label><input type="checkbox" /> 「指定ソース以外を使わない」ルールを最初の指示で固定した</label>
        <label><input type="checkbox" /> 回答末尾を「参照：個別記事URL or KBファイル名」にすることを確認した</label>
      </div>
    </section>
    <section class="panel">
      <span id="promptBadge" class="badge">そのままGeminiに貼り付けOK</span>
      <h2>推奨プロンプト</h2>
      <div id="analyticsScenarioPanel" class="scenario-panel" style="display:none;">
        <label for="analyticsScenarioSelect">分析シナリオを選択</label>
        <select id="analyticsScenarioSelect"></select>
        <p class="scenario-note">選択したシナリオに合わせて、Before/AfterのURLが自動で更新されます。</p>
      </div>
      <div id="geminiPrompt" class="prompt"></div>
    </section>
  </main>
  <script>
    const analyticsScenarioOptions = [
      { id: 'qa_improvement', label: 'FAQ改善（qa_improvement）', date: '20260426' },
      { id: 'campaign_boost', label: '全社キャンペーン（campaign_boost）', date: '20260426' },
      { id: 'policy_change', label: '制度変更周知（policy_change）', date: '20260426' },
      { id: 'factory_busy', label: '繁忙期（factory_busy）', date: '20260426' },
      { id: 'mobile_push', label: 'モバイル強化（mobile_push）', date: '20260426' },
      { id: 'new_joiners', label: '新入社員期（new_joiners）', date: '20260426' }
    ];

    const geminiGuideMap = {
      rfp: {
        summary: 'RFP回答はGeminiよりNotebookLM運用が速く安定します。このカテゴリでは、NotebookLMに公式ソースと補助KBを読み込ませ、根拠付きで責任ある回答を作る方法を案内します。',
        flow: [
          'NotebookLMで新しいノートブックを作成し、`staffbase_urls.md` のURLと `security_kb.md / isms_controls.md / ops_kb.md / compliance_kb.md / limitations_kb.md` をソースとして登録する。',
          '最初の指示で「情報源は staffbase_urls.md と添付KBのみ」「外部一般情報や推測は禁止」「回答前にURLリストとリンク先を解析」を明示してルール固定する。',
          'RFP設問を貼り、製品機能は必ず `/articles/` の個別記事URLまでドリルダウンさせる。トップURL（`/hc/ja`）のみの参照は不可にする。',
          '出力は Summary / Details / 参照（個別記事URLまたはKBファイル名）形式に統一し、`limitations_kb.md` で制約クロスチェックしてから提出版へ反映する。'
        ],
        prompt: 'Staffbase RFP Response Engine\\n\\n1. 役割とミッション\\nあなたは Staffbaseのシニア・セールスエンジニア（SE）です。顧客から提出されたRFP（Excel）に対し、「最新の公式ソース」のみに基づいて、正確かつ責任ある回答を生成してください。\\n\\n2. 唯一のプロダクト情報源（厳守）\\nURL: https://raw.githubusercontent.com/YoheiUmezu/staffbase-product-reference/main/staffbase_urls.md\\n- 回答前に必ず上記URLへアクセスし、記載されている各リンク先を解析すること\\n- URLリスト外の情報、一般知識、過去学習データに基づく回答は禁止\\n\\n3. 補助KB（ローカルファイルのみ参照）\\n- security_kb.md\\n- isms_controls.md\\n- ops_kb.md\\n- compliance_kb.md\\n- limitations_kb.md（必ず制約クロスチェック）\\n\\n4. 回答生成アルゴリズム\\n- 設問分類: 製品機能 / セキュリティ・運用・法務\\n- 情報抽出:\\n  - 製品機能: staffbase_urls.md から最適な個別記事URLを特定して内容抽出\\n  - 重要: `/hc/ja` のようなトップ・汎用URLの参照は禁止。必ず `/articles/` の個別記事までドリルダウン\\n- 制約検証: limitations_kb.md を必ず確認\\n- 根拠不在時: 「要確認（公式資料未記載）」\\n\\n5. 出力ルール\\n- 回答末尾は「参照：」で記載（「根拠」表記は不要）\\n- 参照は `https://support.staffbase.com/hc/ja/articles/〜` の個別記事URL、またはKBファイル名\\n- 「参照：https://support.staffbase.com/hc/ja」のような汎用URLのみの記載は禁止\\n\\n6. 禁止事項\\n- 一般論の流用禁止\\n- 曖昧回答の禁止\\n- 指定外ソースの外部検索結果の混入禁止\\n\\n---\\n以下のRFP設問に対して、上記ルールに厳密に従って回答してください。'
      },
      note: {
        summary: 'note記事の元データ（manus_input.md）を使って、Gemini上で記事生成から最終保存指示まで進めるためのリポジトリです。非エンジニアは「プロンプト運用」に集中すれば使えます。',
        flow: [
          'Geminiにロールを指定し、まず `https://raw.githubusercontent.com/YoheiUmezu/note-article/main/manus_input.md` を読み込ませる（Step 1）。',
          'Step 2として、1500〜2000字・日本企業文脈・具体業務シーン/実例必須・締め文条件・【SEの独り言：現場の解像度】を指定して記事を生成させる。',
          'Step 3として、完成記事をMCP経由でNotionデータベース「note記事まとめ」に保存する指示（タイトル/ステータス/カテゴリ/作成日/本文）を実行させ、最後に保存完了報告を受ける。'
        ],
        prompt: '# Role\\nあなたは「BtoB SaaS企業のセールスエンジニア兼コンテンツ編集者」です。\\n\\n# Step 1\\n以下URLを取得し、本日の執筆テーマと参考インプットを読み取ってください。\\nhttps://raw.githubusercontent.com/YoheiUmezu/note-article/main/manus_input.md\\n\\n# Step 2\\nnote記事を作成してください。\\n- 文字数: 1500〜2000字\\n- トーン: 専門的だが読みやすい（日本企業の稟議・現場運用・導入障壁を重視）\\n- 必須: 具体的な業務シーン + 1つ以上の実例\\n- 必須: 記事末尾に【SEの独り言：現場の解像度】を2〜3行\\n- 締め: staffbaseはツール導入にとどまらずEX課題の解決に取り組む旨\\n\\n# Step 3\\nMCPを使い、Notionデータベース「note記事まとめ」に保存してください。\\n- タイトル: 生成記事タイトル\\n- ステータス: Ready to Post\\n- カテゴリ: EX/従業員エンゲージメント\\n- 作成日: 本日\\n- 本文: Markdown全文\\n\\n# Output\\n1) 記事プレビュー\\n2) Notion保存完了報告\\n\\n# ガイドライン\\n機密情報（未発表機能/顧客名/社内数値）は含めず、一般的なEX改善Tipsに限定。\\n「個人の見解」である旨を明記し、公式ロゴは使用しない。'
      },
      slides: {
        summary: 'Staffbaseブランドに沿ったスライドを再利用可能なJSONで作るためのリポジトリです。デザインルールを守ることが主眼です。',
        flow: [
          'READMEとテンプレートJSONをGeminiへ渡し、「この資料の必須デザインルール」を抽出させる。',
          '伝えたいトピックを箇条書きで入力し、スライド構成案（表紙/要点/まとめ）を作らせる。',
          '完成案をレビューし、表現を業務向けに調整する。'
        ],
        prompt: '以下のトピックを、添付のスライドルールに準拠して提案資料化してください。\\n出力: スライド番号 / タイトル / 1枚の要点 / 話す内容メモ'
      },
      analytics: {
        summary: 'このカテゴリでは、Geminiに分析専用ロールを与えてBefore/After JSONを根拠に検索体験改善レポートを作成します。製造業向けの広報・DX担当が意思決定に使える粒度で出すことが目的です。',
        flow: [
          'Geminiで新規チャットを開き、下記プロンプトを先に貼って分析ルール（JSON根拠必須・抽象論禁止）を固定する。',
          '入力データとして report.md / before.json / after.json の3URLを必ず渡し、「改善幅（%）」と「改善/未改善の判定」を明示させる。',
          '出力はエグゼクティブサマリー→KPI比較→改善クエリ分析→構造的インサイト→次アクション（優先度つき）の順にさせる。',
          '定期運用する場合は、この指示をGem（カスタムGem）として保存し、毎回URLだけ差し替える運用にする。'
        ],
        promptTemplate: 'あなたはBtoB SaaS企業（特に製造業向け）のコンテンツ戦略担当です。\\n\\n以下のデータをもとに、社内ナレッジ改善の分析レポートを作成してください。\\n\\n# 入力データ\\n- 分析レポート（Markdown）:\\nhttps://raw.githubusercontent.com/YoheiUmezu/analytics_json/main/analytics_json/report.md\\n\\n- Beforeデータ（JSON）:\\n{{beforeUrl}}\\n\\n- Afterデータ（JSON）:\\n{{afterUrl}}\\n\\n# 目的\\n・検索体験（Search Experience）の改善結果を明確にする\\n・どのクエリで改善が起きたかを特定する\\n・今後のナレッジ改善アクションを提示する\\n\\n# 出力要件\\n1. エグゼクティブサマリー（5行以内、改善/未改善を明確化）\\n2. KPI比較（検索数/クリック数/CTR/成功率、改善幅%を必ず記載）\\n3. 改善クエリ分析（改善上位5クエリ、悪化クエリ、Before/After数値、変化理由の仮説）\\n4. 構造的インサイト（コンテンツ不足/検索意図とのズレ/UI導線）\\n5. 次アクション（どの記事をどう改善するか、新規作成記事、優先順位High/Medium/Low）\\n6. トーン: 日本語・ビジネス向け・具体化重視\\n\\n# 制約\\n- JSONデータを必ず根拠として使う\\n- 推測だけの記述は禁止\\n- 箇条書きを多用し、読みやすくする\\n\\nこの要件に厳密に従って出力してください。'
      },
      product_reference: {
        summary: 'このカテゴリでは、Geminiに「Staffbase Technical Sales Support Agent」ロールを与え、staffbase_urls.mdのURLリストだけを根拠に技術回答を作る運用を行います。',
        flow: [
          'Geminiで新規チャットを開き、下記ロールプロンプトを最初に貼って「このルールで回答して」と固定する。',
          '質問ごとに「先に staffbase_urls.md を解析し、関連URLを選んでから回答する」ことを必ず指示する。',
          '運用頻度が高い場合は、同じ指示をGem（カスタムGem）として保存し、毎回の貼り付けを省略する。',
          '最終回答は Summary / Details / Reference URL の3部構成になっているかと、推測混入がないかだけ人が確認して送信する。'
        ],
        prompt: '# Role: Staffbase Technical Sales Support Agent\\n\\n## 1. Persona\\nあなたはStaffbaseのシニア・セールスエンジニア（SE）です。同僚の営業担当者やビジネスパートナーからの製品仕様、機能、セキュリティ、インテグレーションに関する技術的な質問に対して、プロフェッショナルかつ簡潔に回答を提供することが任務です。\\n\\n## 2. Information Source (厳守事項)\\n回答の根拠は、提供された https://raw.githubusercontent.com/YoheiUmezu/staffbase-product-reference/main/staffbase_urls.md に記載されているURLリストのみに限定してください。\\n- URLリスト外の情報は参照しない\\n- 関連情報が見当たらない場合は、次の文言で回答する:「提供されたナレッジベース内には該当する情報が見当たりませんでした。最新の製品ドキュメントを確認するか、内部のプロダクトチームへエスカレーションしてください」\\n- 回答を生成する前に、必ず指定URLリストをパースしてコンテキストとしてロードする\\n- staffbase_urls.mdをインデックスとして使い、関連リンク先の内容に基づいて回答する\\n\\n## 3. Response Structure\\n1. Summary (要約): 1〜2文\\n2. Details (詳細説明): 箇条書き、必要に応じて制約や注意点も補足\\n3. Reference URL (参照元): 根拠URLを必ず明記\\n\\n## 4. Tone and Style\\n- プロフェッショナルなビジネス日本語\\n- 正確性重視（曖昧表現を避ける）\\n- SE視点で、営業やパートナーが顧客へそのまま伝えられる構成\\n\\n## 5. Constraint Check\\n回答前に必ず自己確認すること:\\n- 根拠が staffbase_urls.md のURL内に存在するか\\n- 外部の一般知識や過去学習データを混入させていないか\\n\\n---\\n以下の質問にこのルールで回答してください。'
      }
    };

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function renderFlow(flow) {
      const root = document.getElementById('geminiFlow');
      root.innerHTML = '';
      (flow || []).forEach((item, index) => {
        const block = document.createElement('div');
        block.className = 'step';
        block.innerHTML = `<strong>Step ${index + 1}</strong><div>${escapeHtml(item)}</div>`;
        root.appendChild(block);
      });
    }

    function buildAnalyticsPrompt(scenarioId) {
      const selected = analyticsScenarioOptions.find((option) => option.id === scenarioId) || analyticsScenarioOptions[0];
      const beforeUrl = `https://raw.githubusercontent.com/YoheiUmezu/analytics_json/main/analytics_json/analytics_${selected.date}_${selected.id}_before.json`;
      const afterUrl = `https://raw.githubusercontent.com/YoheiUmezu/analytics_json/main/analytics_json/analytics_${selected.date}_${selected.id}_after.json`;
      return geminiGuideMap.analytics.promptTemplate
        .replace('{{beforeUrl}}', beforeUrl)
        .replace('{{afterUrl}}', afterUrl);
    }

    function setupAnalyticsScenarioSelector() {
      const panel = document.getElementById('analyticsScenarioPanel');
      const select = document.getElementById('analyticsScenarioSelect');
      select.innerHTML = '';
      for (const option of analyticsScenarioOptions) {
        const el = document.createElement('option');
        el.value = option.id;
        el.textContent = option.label;
        select.appendChild(el);
      }
      select.value = 'qa_improvement';
      document.getElementById('geminiPrompt').textContent = buildAnalyticsPrompt(select.value);
      select.onchange = () => {
        document.getElementById('geminiPrompt').textContent = buildAnalyticsPrompt(select.value);
      };
      panel.style.display = 'block';
    }

    async function loadUseCase() {
      const params = new URLSearchParams(window.location.search);
      const category = params.get('category') || 'unknown';
      const isRfp = category === 'rfp';
      document.getElementById('title').textContent = isRfp ? 'rfp のNotebookLM使用ガイド' : `${escapeHtml(category)} のGemini使用ガイド`;
      document.getElementById('flowHeading').textContent = isRfp ? 'NotebookLMで1から使うフロー' : 'Geminiで1から使うフロー';
      document.getElementById('promptBadge').textContent = isRfp ? 'そのままNotebookLMに貼り付けOK' : 'そのままGeminiに貼り付けOK';
      const guide = geminiGuideMap[category];
      document.getElementById('plainSummary').textContent = guide ? guide.summary : 'このカテゴリの説明は準備中です。';
      renderFlow(guide ? guide.flow : []);
      document.getElementById('analyticsScenarioPanel').style.display = 'none';
      document.getElementById('rfpChecklistPanel').style.display = isRfp ? 'block' : 'none';
      if (category === 'analytics') {
        setupAnalyticsScenarioSelector();
      } else {
        document.getElementById('geminiPrompt').textContent = guide ? guide.prompt : '準備中';
      }
    }

    loadUseCase().catch((error) => {
      document.getElementById('subtitle').textContent = '読み込みに失敗しました。';
      document.getElementById('plainSummary').textContent = error.message;
    });
  </script>
</body>
</html>
