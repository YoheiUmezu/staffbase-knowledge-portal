<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staffbase Knowledge Portal</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2a44; }
    header { background: #0b1446; color: #fff; padding: 24px; }
    main { max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    .card h3 { margin: 0 0 8px; }
    .card p { margin: 0 0 8px; font-size: 14px; }
    .card a { color: #0b1446; text-decoration: none; }
    .meta { font-size: 12px; color: #506080; }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    button { border: 1px solid #d2dbef; background: #fff; color: #1f2a44; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
    button.primary { background: #0b1446; color: #fff; border-color: #0b1446; }
    .cta { margin-top: 14px; display: block; width: 100%; text-align: left; border: 1px solid #c7d3f5; background: linear-gradient(135deg, #0b1446, #1c2f87); color: #fff; border-radius: 12px; padding: 14px 16px; cursor: pointer; }
    .cta-title { font-size: 16px; font-weight: 700; line-height: 1.4; }
    .cta-sub { font-size: 12px; opacity: 0.92; margin-top: 4px; }
    .cta-row { margin-top: 10px; font-size: 12px; opacity: 0.95; }
    #detailView { display: none; }
    .panel { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    #docContent h1, #docContent h2, #docContent h3 { margin: 16px 0 8px; }
    #docContent p, #docContent li { line-height: 1.6; }
    #docContent ul { padding-left: 20px; }
    .guide { margin-top: 14px; padding: 16px; border: 1px solid #dce5ff; border-radius: 10px; background: #f8faff; }
    .guide h3 { margin: 0 0 8px; }
    .guide ol { margin: 0; padding-left: 20px; }
    .guide li { margin: 8px 0; line-height: 1.5; }
    .repo-links { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .repo-links a { display: inline-block; border: 1px solid #ccd8fb; background: #fff; color: #1f2a44; border-radius: 8px; padding: 8px 12px; text-decoration: none; font-size: 14px; }
    .repo-links a.primary { background: #0b1446; border-color: #0b1446; color: #fff; }
    .repo-note { margin-top: 8px; font-size: 12px; color: #506080; }
    .pdf-panel { margin-top: 14px; display: none; }
    .pdf-header { display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
    .pdf-link { color: #2148a6; text-decoration: none; font-size: 13px; }
    .pdf-wrap { margin-top: 10px; border: 1px solid #dce5ff; border-radius: 10px; overflow: hidden; background: #fff; }
    .pdf-frame { width: 100%; height: min(72vh, 840px); border: 0; display: block; }
    @media (max-width: 768px) {
      .pdf-frame { height: 58vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>業務ナレッジポータル</h1>
    <p>何に使うかから選べる、非エンジニア向けガイド</p>
  </header>
  <main>
    <section id="listView">
      <h2>業務カテゴリ一覧</h2>
      <div id="categories" class="grid"></div>
    </section>
    <section id="detailView">
      <div class="actions">
        <button id="backButton">カテゴリ一覧に戻る</button>
      </div>
      <article class="panel">
        <h2 id="detailTitle"></h2>
        <p id="detailUseCase"></p>
        <button id="openDataButton" class="cta">
          <div class="cta-title">実際のユースケースを見る</div>
          <div class="cta-sub">このカテゴリの使い方・プロンプト・運用手順をすぐ確認</div>
          <div class="cta-row">→ まず3分で全体像を把握する</div>
        </button>
        <div id="docContent"></div>
        <section class="guide">
          <h3>Githubリポジトリ</h3>
          <ol id="guideSteps"></ol>
          <div class="repo-links">
            <a id="repoOpenLink" class="primary" href="#" target="_blank" rel="noopener noreferrer">GitHubで開く</a>
            <a id="repoDownloadLink" href="#" target="_blank" rel="noopener noreferrer">ZIPでダウンロード</a>
          </div>
          <p id="repoNote" class="repo-note"></p>
        </section>
        <section id="pdfPanel" class="pdf-panel">
          <div class="pdf-header">
            <h3 id="pdfTitle">PDFビューア</h3>
            <a id="pdfOpenLink" class="pdf-link" href="#" target="_blank" rel="noopener noreferrer">新しいタブで開く</a>
          </div>
          <div class="pdf-wrap">
            <iframe id="pdfFrame" class="pdf-frame" title="Category PDF Viewer"></iframe>
          </div>
        </section>
      </article>
    </section>
  </main>
  <script>
    let portalIndex = null;
    const categoryPdfMap = {
      rfp: { title: 'RFP回答PDFビューア', path: 'asset/answered_rfp - 03_機能要件.pdf' },
      analytics: { title: 'Analytics PDFビューア', path: 'asset/mobile_push_report.pdf' },
    };
    const repoGuideMap = {
      rfp: {
        name: 'staffbase-rfp',
        url: 'https://github.com/YoheiUmezu/staffbase-rfp',
        steps: ['READMEを読んで、回答の全体方針を把握する', '既存ファイルや入力フォーマットを確認する', '自社のRFP業務に合わせてテンプレートを流用する']
      },
      note: {
        name: 'note-article',
        url: 'https://github.com/YoheiUmezu/note-article',
        steps: ['READMEの実行手順どおりに一度ローカル実行する', '生成されたMarkdownの見出しと本文を確認する', '必要な表現だけを編集して公開フローに載せる']
      },
      slides: {
        name: 'slide-template',
        url: 'https://github.com/YoheiUmezu/slide-template',
        steps: ['READMEでデザインルールを先に確認する', 'テンプレートJSONの項目を差し替えて試作する', '完成スライドを社内レビューし再利用テンプレート化する']
      },
      analytics: {
        name: 'analytics_json',
        url: 'https://github.com/YoheiUmezu/analytics_json',
        steps: ['READMEのシナリオ一覧から対象業務を選ぶ', 'before/afterデータとレポートをセットで確認する', '会議資料にはlatestファイルを優先して使う']
      },
      product_reference: {
        name: 'staffbase-product-reference',
        url: 'https://github.com/YoheiUmezu/staffbase-product-reference',
        steps: ['READMEに沿ってURL一覧の更新方法を把握する', '問い合わせ時は一覧から該当ヘルプ記事を選ぶ', '回答文には参照した記事URLを必ず添える']
      }
    };

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function markdownToHtml(markdown) {
      const lines = markdown.split('\n');
      let html = '';
      let inList = false;

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          continue;
        }
        if (line.startsWith('### ')) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += `<h3>${escapeHtml(line.slice(4))}</h3>`;
          continue;
        }
        if (line.startsWith('## ')) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += `<h2>${escapeHtml(line.slice(3))}</h2>`;
          continue;
        }
        if (line.startsWith('# ')) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += `<h1>${escapeHtml(line.slice(2))}</h1>`;
          continue;
        }
        if (line.startsWith('- ')) {
          if (!inList) {
            html += '<ul>';
            inList = true;
          }
          html += `<li>${escapeHtml(line.slice(2))}</li>`;
          continue;
        }
        if (inList) {
          html += '</ul>';
          inList = false;
        }
        html += `<p>${escapeHtml(line)}</p>`;
      }

      if (inList) {
        html += '</ul>';
      }
      return html;
    }

    function showList() {
      document.getElementById('listView').style.display = 'block';
      document.getElementById('detailView').style.display = 'none';
    }

    function showDetail() {
      document.getElementById('listView').style.display = 'none';
      document.getElementById('detailView').style.display = 'block';
    }

    async function renderList(data) {
      const root = document.getElementById('categories');
      root.innerHTML = '';
      for (const c of data.categories) {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `<h3><a href="#category=${c.id}">${c.title}</a></h3><p><strong>何に使うか:</strong> ${c.use_case || '準備中'}</p><p class="meta">カテゴリID: ${c.id}</p>`;
        root.appendChild(card);
      }
    }

    async function renderDetail(categoryId) {
      const category = portalIndex.categories.find((c) => c.id === categoryId);
      if (!category) {
        showList();
        return;
      }
      const docPath = (category.doc || '').replace(/^docs\//, '');
      const dataPath = (category.data || '').replace(/^data\//, 'data/');

      document.getElementById('detailTitle').textContent = category.title;
      document.getElementById('detailUseCase').textContent = `何に使うか: ${category.use_case || '準備中'}`;
      document.getElementById('openDataButton').onclick = () => {
        window.location.href = `usecase.html?category=${encodeURIComponent(category.id)}&data=${encodeURIComponent(dataPath)}`;
      };

      const docRes = await fetch(docPath);
      const markdown = await docRes.text();
      document.getElementById('docContent').innerHTML = markdownToHtml(markdown);

      const guide = repoGuideMap[category.id];
      const guideSteps = document.getElementById('guideSteps');
      guideSteps.innerHTML = '';
      if (guide) {
        for (const step of guide.steps) {
          const li = document.createElement('li');
          li.textContent = step;
          guideSteps.appendChild(li);
        }
        document.getElementById('repoOpenLink').href = guide.url;
        document.getElementById('repoDownloadLink').href = `${guide.url}/archive/refs/heads/main.zip`;
        document.getElementById('repoNote').textContent = `${guide.name} をダウンロードして、そのまま業務テンプレートとして使えます。`;
      } else {
        const li = document.createElement('li');
        li.textContent = '関連リポジトリ情報は準備中です。';
        guideSteps.appendChild(li);
        document.getElementById('repoOpenLink').href = '#';
        document.getElementById('repoDownloadLink').href = '#';
        document.getElementById('repoNote').textContent = '';
      }

      const pdfPanel = document.getElementById('pdfPanel');
      const pdfConfig = categoryPdfMap[category.id];
      if (pdfConfig) {
        const encoded = encodeURI(pdfConfig.path);
        document.getElementById('pdfTitle').textContent = pdfConfig.title;
        document.getElementById('pdfOpenLink').href = encoded;
        document.getElementById('pdfFrame').src = encoded;
        pdfPanel.style.display = 'block';
      } else {
        pdfPanel.style.display = 'none';
      }
      showDetail();
    }

    async function route() {
      const hash = window.location.hash;
      if (!hash.startsWith('#category=')) {
        showList();
        return;
      }
      const categoryId = hash.replace('#category=', '').trim();
      await renderDetail(categoryId);
    }

    async function init() {
      const res = await fetch('data/index.json');
      if (!res.ok) {
        throw new Error(`Failed to load index.json: ${res.status}`);
      }
      portalIndex = await res.json();
      await renderList(portalIndex);
      document.getElementById('backButton').onclick = () => {
        window.location.hash = '';
      };
      window.addEventListener('hashchange', route);
      await route();
    }
    init().catch((error) => {
      const root = document.getElementById('categories');
      root.innerHTML = `<article class="card"><h3>読み込みエラー</h3><p>ポータルデータの取得に失敗しました。</p><p class="meta">${escapeHtml(error.message)}</p></article>`;
    });
  </script>
</body>
</html>
